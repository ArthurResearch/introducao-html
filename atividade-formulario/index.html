<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Exemplo</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
</head>
<body>
    <form action="/submit" method="POST">
        <h3>Cadastre-se</h3>

        <div class="form-group">
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome">
        </div>

        <div class="form-group">
            <label for="data_nascimento">Data de Nascimento:</label>
            <input type="date" id="data_nascimento" name="data_nascimento">
        </div>

        <div class="form-group">
            <label for="cpf">CPF</label>
            <input type="text" id="cpf" name="cpf">
        </div>

        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email">
        </div>

        <div class="form-group">
            <label for="telefone">Telefone</label>
            <input type="tel" id="telefone" name="telefone">
        </div>

        <div class="form-group">
            <label for="arquivo">Adicione seu Currículo</label>
            <input type="file" id="arquivo" name="arquivo">
        </div>

        <div class="form-group">
            <label>Habilidades:</label>

            <label for="html">
                <input type="checkbox" id="html" name="habilidades" value="HTML">HTML
            </label>
            <label for="css">
                <input type="checkbox" id="css" name="habilidades" value="CSS">CSS
            </label>
            <label for="js">
                <input type="checkbox" id="js" name="habilidades" value="JS">JavaScript
            </label>
        </div>

        <div class="form-group">
            <label for="pais">País:</label>
            <select id="pais" name="pais">
                <option value="br">Brasil</option>
                <option value="US">USA</option>
                <option value="PL">Polônia</option>
                <option value="UA">Ucrânia</option>
                <option value="JP">Japão</option>
            </select>
        </div>

        <div class="form-group">
            <label for="comentarios">Comentários:</label>
            <div id="editor" style="height:200px;"></div>
        </div>

        <div class="form-group">
            <button type="submit">Enviar</button>
        </div>
    </form>
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

    <script>
        var quill = new Quill('#editor', {theme: 'snow'});
    </script>
</body>
</html>
